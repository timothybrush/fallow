version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      oxc:
        patterns: ["oxc_*"]
      crypto-rng:
        patterns: ["ed25519-dalek", "rand", "rand_core"]
    open-pull-requests-limit: 10

  - package-ecosystem: cargo
    directory: /fuzz
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    allow:
      # The fuzz workspace has one direct registry dependency. Its lockfile also
      # contains the root workspace graph through the fallow-core path dependency.
      - dependency-name: libfuzzer-sys
    open-pull-requests-limit: 10

  - package-ecosystem: cargo
    directory: /editors/zed
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /editors/vscode
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    ignore:
      # Pinned so engines.vscode floor stays low and Cursor/Windsurf forks can install.
      # Bump deliberately when raising the engine floor.
      - dependency-name: "@types/vscode"

  - package-ecosystem: npm
    directory: /npm/fallow
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /benchmarks
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /crates/napi
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /apps/review-electron
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /viz-frontend
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
