name: Benchmarks

on:
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/bench.yml'
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/bench.yml'
  workflow_dispatch:

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: CodSpeed performance check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: ./.github/actions/setup-rust
        with:
          cache-key: bench

      - name: Install cargo-codspeed
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cargo-codspeed@4.7.0

      - name: Build benchmark
        # Keep PR feedback focused: core analysis plus programmatic command profiles.
        # large_analysis stays out because it exceeds the fast benchmark budget.
        run: |
          cargo codspeed build -p fallow-core --bench analysis
          cargo codspeed build -p fallow-benchmarks --bench programmatic_commands

      - name: Run benchmark
        uses: CodSpeedHQ/action@c145068895e045cc725ee76fcd2307624b65c3af # v4.17.5
        with:
          mode: simulation
          run: |
            set -euo pipefail
            cargo codspeed run -p fallow-core --bench analysis
            cargo codspeed run -p fallow-benchmarks --bench programmatic_commands
