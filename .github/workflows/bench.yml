name: Benchmarks

on:
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/bench.yml'
      - '.github/actions/setup-rust/**'
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/bench.yml'
      - '.github/actions/setup-rust/**'
  workflow_dispatch:

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C debuginfo=1 -C strip=none -g --cfg codspeed"

jobs:
  benchmark:
    name: CodSpeed fast simulation (${{ matrix.label }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: core analysis
            cache_key: core-analysis
            package: fallow-core
            bench: analysis
          - label: programmatic commands
            cache_key: programmatic-commands
            package: fallow-benchmarks
            bench: programmatic_commands
          - label: representative sources
            cache_key: representative-sources
            package: fallow-benchmarks
            bench: representative_sources
          - label: scaling analysis
            cache_key: scaling-analysis
            package: fallow-core
            bench: scaling_analysis
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust
        with:
          cache-key: bench-${{ matrix.cache_key }}

      - name: Install cargo-codspeed
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cargo-codspeed@4.7.0

      - name: Build benchmark shard
        # Keep PR feedback focused: the full main/manual job uploads the slower suite.
        run: cargo codspeed build -p ${{ matrix.package }} --bench ${{ matrix.bench }} --features codspeed

      - name: Run benchmark shard
        uses: CodSpeedHQ/action@63f3e98b61959fe67f146a3ff022e4136fe9bb9c # v4.17.6
        with:
          mode: simulation
          run: cargo codspeed run -p ${{ matrix.package }} --bench ${{ matrix.bench }}

  benchmark-full:
    name: CodSpeed full simulation (large analysis)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust
        with:
          cache-key: bench-large-analysis

      - name: Install cargo-codspeed
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cargo-codspeed@4.7.0

      - name: Build large benchmark shard
        run: cargo codspeed build -p fallow-core --bench large_analysis --features codspeed

      - name: Run large benchmark shard
        uses: CodSpeedHQ/action@63f3e98b61959fe67f146a3ff022e4136fe9bb9c # v4.17.6
        with:
          mode: simulation
          run: cargo codspeed run -p fallow-core --bench large_analysis
