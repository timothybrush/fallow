name: Benchmarks

on:
  merge_group:
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/bench.yml'
      - '.github/actions/setup-rust/**'
      - '.github/scripts/generate-benchmark-matrix.mjs'
      - '.github/scripts/generate-benchmark-matrix.test.mjs'
      - 'scripts/check-benchmark-harness.py'
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/bench.yml'
      - '.github/actions/setup-rust/**'
      - '.github/scripts/generate-benchmark-matrix.mjs'
      - '.github/scripts/generate-benchmark-matrix.test.mjs'
      - 'scripts/check-benchmark-harness.py'
  workflow_dispatch:

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C debuginfo=1 -C strip=none -g --cfg codspeed"

jobs:
  benchmark-harness:
    name: Benchmark harness
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check benchmark harness drift
        run: python3 scripts/check-benchmark-harness.py

  determine-matrix:
    name: Determine benchmark matrix
    needs: benchmark-harness
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    outputs:
      fast_matrix: ${{ steps.matrix.outputs.fast_matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Determine affected benchmark shards
        id: matrix
        env:
          BENCH_EVENT_BEFORE: ${{ github.event.before }}
        run: |
          MATRIX=$(node .github/scripts/generate-benchmark-matrix.mjs)
          echo "fast_matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Fast benchmark matrix: $MATRIX"

  benchmark:
    name: CodSpeed fast simulation (${{ matrix.label }})
    needs:
      - benchmark-harness
      - determine-matrix
    if: needs.determine-matrix.outputs.fast_matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.determine-matrix.outputs.fast_matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust
        with:
          cache-key: bench-${{ matrix.cache_key }}

      - name: Install cargo-codspeed
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-codspeed@4.7.0

      - name: Build benchmark shard
        # Keep PR feedback focused on deterministic API/session/cache paths.
        run: cargo codspeed build -p ${{ matrix.package }} --bench ${{ matrix.bench }} --features codspeed

      - name: Run benchmark shard
        uses: CodSpeedHQ/action@f99becdce5e5d51fd556489ebef684f4ecfd6286 # v4.18.5
        with:
          mode: simulation
          run: cargo codspeed run -p ${{ matrix.package }} --bench ${{ matrix.bench }}

  benchmark-full:
    name: CodSpeed full simulation (${{ matrix.label }})
    needs: benchmark-harness
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: scaling analysis
            cache_key: full-scaling-analysis
            package: fallow-core
            bench: scaling_analysis
          - label: large analysis
            cache_key: full-large-analysis
            package: fallow-core
            bench: large_analysis
          - label: engine dupes pipeline
            cache_key: full-engine-dupes-pipeline
            package: fallow-engine
            bench: dupes_pipeline
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust
        with:
          cache-key: bench-${{ matrix.cache_key }}

      - name: Install cargo-codspeed
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-codspeed@4.7.0

      - name: Build full benchmark shard
        # Full suites include audit/git-heavy and scaling paths that are useful but noisier.
        run: cargo codspeed build -p ${{ matrix.package }} --bench ${{ matrix.bench }} --features codspeed

      - name: Run full benchmark shard
        uses: CodSpeedHQ/action@f99becdce5e5d51fd556489ebef684f4ecfd6286 # v4.18.5
        with:
          mode: simulation
          run: cargo codspeed run -p ${{ matrix.package }} --bench ${{ matrix.bench }}
