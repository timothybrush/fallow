name: Ecosystem (Full)

on:
  schedule:
    # Every Sunday at 04:00 UTC
    - cron: '0 4 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ecosystem-full-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FALLOW_QUIET: "1"

jobs:
  ecosystem-test:
    name: Test against real-world projects
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-rust
        with:
          cache-key: ecosystem-full

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4
        with:
          version: 9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'

      - name: Cache cloned repos
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: /tmp/fallow-ecosystem
          key: ecosystem-repos-${{ github.run_id }}
          restore-keys: |
            ecosystem-repos-

      - name: Build fallow (release)
        run: cargo build --release -p fallow-cli

      - name: Run ecosystem tests
        env:
          FALLOW_BIN: ${{ github.workspace }}/target/release/fallow
          ECOSYSTEM_DIR: /tmp/fallow-ecosystem
        run: ./tests/ecosystem/run.sh

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ecosystem-results
          path: /tmp/fallow-ecosystem/results/
          retention-days: 30
