name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-crates:
    name: Publish Rust crates
    needs: release-verified
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust
        with:
          # Dedicated cache scope; do not share with main / PR builds. A poisoned
          # workspace cache from another job could otherwise be restored here and
          # influence the bundle that `cargo package` produces.
          cache-key: release-publish-crates

      # --no-verify skips the post-package verify-build. Verifying again here
      # would compile every transitive dependency's build.rs with
      # CARGO_REGISTRY_TOKEN available in the environment; a single compromised
      # build script could exfiltrate the token. The same code already built
      # cleanly in CI on the commit that produced this tag, so the verify build
      # is a redundant safety net we can drop on the privileged path.

      - name: Authenticate to crates.io
        id: crates_io_auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      # Publish every workspace crate in dependency order. A crate that depends
      # on a just-published sibling can race the crates.io index: the sibling
      # uploads seconds earlier but the index has not propagated its new version
      # yet, so `cargo publish` aborts with "failed to select a version for the
      # requirement". The retry loop below waits that lag out.
      #
      # The error classification is load-bearing (incident v2.98.0). The old
      # per-crate `|| echo "Already published, skipping"` swallowed EVERY
      # failure, so fallow-cli's index-lag abort shipped a release with
      # fallow-cli missing from crates.io while the job still reported success.
      # Now: a genuine "already uploaded" is swallowed (idempotent re-runs),
      # index-lag and clear network-transient errors are retried with backoff,
      # and any OTHER failure fails the step instead of being masked.
      - name: Publish crates to crates.io
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates_io_auth.outputs.token }}
        run: |
          set -uo pipefail
          publish() {
            crate="$1"
            attempt=1
            max_attempts=8
            while :; do
              if out=$(cargo publish -p "$crate" --no-verify 2>&1); then
                printf '%s\n' "$out"
                echo "::notice::${crate}: published"
                return 0
              fi
              printf '%s\n' "$out"
              # Already on the registry (idempotent re-run) -> not an error.
              if printf '%s' "$out" | grep -qiE 'already (been )?uploaded|already exists'; then
                echo "::notice::${crate}: already published, skipping"
                return 0
              fi
              # crates.io index lag for a just-published dependency, or a clear
              # network-transient error -> wait and retry.
              if [ "$attempt" -lt "$max_attempts" ] && printf '%s' "$out" | grep -qiE 'failed to select a version for the requirement|candidate versions found which did|429 Too Many Requests|50[234] |Service Unavailable|Gateway Time-?out|timed out|error sending request'; then
                echo "::warning::${crate}: transient publish error (attempt ${attempt}/${max_attempts}); retrying in 30s"
                sleep 30
                attempt=$((attempt + 1))
                continue
              fi
              # Anything else is a real failure: do NOT mask it.
              echo "::error::${crate}: cargo publish failed and is neither already-published nor a known transient error"
              return 1
            done
          }
          first=1
          for crate in fallow-types fallow-config fallow-output fallow-extract fallow-graph fallow-security fallow-core fallow-engine fallow-api fallow-license fallow-v8-coverage fallow-cli fallow-mcp; do
            # Settle delay between crates so a dependent crate usually finds its
            # dependency already indexed; the retry loop is the real guarantee.
            if [ "$first" = 0 ]; then sleep 30; fi
            first=0
            publish "$crate" || exit 1
          done

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: fallow
            multicall_binary: fallow-multicall
            lsp_binary: fallow-lsp
            mcp_binary: fallow-mcp
            npm_dir: darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: fallow
            multicall_binary: fallow-multicall
            lsp_binary: fallow-lsp
            mcp_binary: fallow-mcp
            npm_dir: darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            container: rust:1.95-bullseye
            binary: fallow
            multicall_binary: fallow-multicall
            lsp_binary: fallow-lsp
            mcp_binary: fallow-mcp
            npm_dir: linux-x64-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            container: rust:1.95-bullseye
            binary: fallow
            multicall_binary: fallow-multicall
            lsp_binary: fallow-lsp
            mcp_binary: fallow-mcp
            npm_dir: linux-arm64-gnu
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: fallow
            multicall_binary: fallow-multicall
            lsp_binary: fallow-lsp
            mcp_binary: fallow-mcp
            npm_dir: linux-x64-musl
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            binary: fallow
            multicall_binary: fallow-multicall
            lsp_binary: fallow-lsp
            mcp_binary: fallow-mcp
            npm_dir: linux-arm64-musl
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: fallow.exe
            multicall_binary: fallow-multicall.exe
            lsp_binary: fallow-lsp.exe
            mcp_binary: fallow-mcp.exe
            npm_dir: win32-x64-msvc
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            binary: fallow.exe
            multicall_binary: fallow-multicall.exe
            lsp_binary: fallow-lsp.exe
            mcp_binary: fallow-mcp.exe
            npm_dir: win32-arm64-msvc

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust
        with:
          targets: ${{ matrix.target }}
          cache-key: ${{ matrix.target }}-${{ matrix.container || 'host' }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: |
          apt_get="apt-get"
          if command -v sudo >/dev/null 2>&1; then
            apt_get="sudo apt-get"
          fi
          $apt_get update
          $apt_get install -y musl-tools

      - name: Install aarch64 cross-compilation tools
        if: contains(matrix.target, 'aarch64-unknown-linux')
        run: |
          apt_get="apt-get"
          if command -v sudo >/dev/null 2>&1; then
            apt_get="sudo apt-get"
          fi
          $apt_get update
          $apt_get install -y gcc-aarch64-linux-gnu

      # fallow-mcp pulls rquickjs (QuickJS, a C library). On aarch64-musl the
      # glibc cross-gcc cannot link C objects into a musl binary, so the MCP
      # build for this one target uses cargo-zigbuild (zig cc as a musl-capable
      # C cross-compiler). Pinned to the pair validated locally against
      # rquickjs-sys 0.12. x86_64-musl (native musl-gcc) and aarch64-gnu (glibc
      # cross-gcc against a glibc target) keep the plain cargo build.
      - name: Install cargo-zigbuild for aarch64-musl C cross-compile
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          python3 -m pip install --user --break-system-packages cargo-zigbuild==0.22.3 ziglang==0.16.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/cargo-zigbuild" --version
          python3 -m ziglang version

      - name: Build CLI release binary
        run: cargo build --release --target ${{ matrix.target }} -p fallow-cli
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc

      - name: Build LSP release binary
        run: cargo build --release --target ${{ matrix.target }} -p fallow-lsp
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc

      - name: Build MCP release binary
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }} -p fallow-mcp
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc

      - name: Build MCP release binary (aarch64-musl, QuickJS C via zig)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo zigbuild --release --target ${{ matrix.target }} -p fallow-mcp

      # The multicall binary bundles the CLI plus the LSP and MCP server libs
      # into the single `fallow` binary the npm platform packages ship. Because
      # it links the MCP lib, it pulls rquickjs (QuickJS, C) exactly like the
      # standalone MCP binary, so the aarch64-musl leg needs cargo-zigbuild for
      # the same reason (the glibc cross-gcc cannot link C into a musl binary).
      # Every other target keeps the plain cargo build.
      - name: Build multicall release binary
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }} -p fallow-multicall
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc

      - name: Build multicall release binary (aarch64-musl, QuickJS C via zig)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo zigbuild --release --target ${{ matrix.target }} -p fallow-multicall

      - name: Install NAPI package dependencies
        run: cd crates/napi && npm ci --omit=optional --ignore-scripts

      - name: Build NAPI addon
        run: cd crates/napi && npx napi build --platform --profile napi-release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc

      - name: Verify GNU glibc compatibility
        if: contains(matrix.target, 'unknown-linux-gnu')
        run: |
          ldd --version | head -n1
          max_allowed="2.31"
          if ! command -v readelf >/dev/null 2>&1; then
            apt-get update
            apt-get install -y binutils
          fi

          check_glibc_floor() {
            artifact="$1"
            if [ ! -f "$artifact" ]; then
              echo "::error::$artifact missing"
              exit 1
            fi

            max_required=$(
              readelf --version-info "$artifact" |
                sed -n 's/.*Name: GLIBC_\([0-9.]*\).*/\1/p' |
                sort -Vu |
                tail -n1
            )

            if [ -z "$max_required" ]; then
              echo "$artifact: no dynamic GLIBC requirement found"
              return 0
            fi

            echo "$artifact: requires GLIBC_$max_required"
            highest=$(printf '%s\n%s\n' "$max_required" "$max_allowed" | sort -V | tail -n1)
            if [ "$highest" != "$max_allowed" ]; then
              echo "::error::$artifact requires GLIBC_$max_required; maximum allowed is GLIBC_$max_allowed"
              exit 1
            fi
          }

          check_glibc_floor "target/${{ matrix.target }}/release/${{ matrix.binary }}"
          check_glibc_floor "target/${{ matrix.target }}/release/${{ matrix.multicall_binary }}"
          check_glibc_floor "target/${{ matrix.target }}/release/${{ matrix.lsp_binary }}"
          check_glibc_floor "target/${{ matrix.target }}/release/${{ matrix.mcp_binary }}"
          check_glibc_floor "crates/napi/fallow-node.${{ matrix.npm_dir }}.node"

      - name: Package binaries (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../fallow-${{ matrix.target }}.tar.gz ${{ matrix.binary }} ${{ matrix.lsp_binary }} ${{ matrix.mcp_binary }}

      - name: Package binaries (windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../fallow-${{ matrix.target }}.zip ${{ matrix.binary }} ${{ matrix.lsp_binary }} ${{ matrix.mcp_binary }}

      - name: Upload release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fallow-${{ matrix.target }}
          path: fallow-${{ matrix.target }}.*

      # `fallow-<npm_dir>` (standalone CLI), `fallow-lsp-<npm_dir>`, and
      # `fallow-mcp-<npm_dir>` are the per-platform signed GitHub release assets
      # (unchanged). `fallow-multicall-<npm_dir>` is the bundled binary the npm
      # platform packages ship (as `fallow`); it is signed alongside the others
      # below and staged into the npm payload, but is NOT a GitHub release asset.
      - name: Rename CLI, LSP, MCP, and multicall binaries with target identifier (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} fallow-${{ matrix.npm_dir }}
          cp target/${{ matrix.target }}/release/${{ matrix.multicall_binary }} fallow-multicall-${{ matrix.npm_dir }}
          cp target/${{ matrix.target }}/release/${{ matrix.lsp_binary }} fallow-lsp-${{ matrix.npm_dir }}
          cp target/${{ matrix.target }}/release/${{ matrix.mcp_binary }} fallow-mcp-${{ matrix.npm_dir }}

      - name: Rename CLI, LSP, MCP, and multicall binaries with target identifier (windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} fallow-${{ matrix.npm_dir }}.exe
          cp target/${{ matrix.target }}/release/${{ matrix.multicall_binary }} fallow-multicall-${{ matrix.npm_dir }}.exe
          cp target/${{ matrix.target }}/release/${{ matrix.lsp_binary }} fallow-lsp-${{ matrix.npm_dir }}.exe
          cp target/${{ matrix.target }}/release/${{ matrix.mcp_binary }} fallow-mcp-${{ matrix.npm_dir }}.exe

      - name: Verify binary-signing public key parity
        shell: bash
        env:
          ED25519_BINARY_SIGNING_PUBLIC_KEY: ${{ vars.ED25519_BINARY_SIGNING_PUBLIC_KEY }}
        run: node scripts/signing-key-parity.mjs --release-env

      - name: Sign raw binaries
        shell: bash
        env:
          ED25519_BINARY_SIGNING_PRIVATE_KEY: ${{ secrets.ED25519_BINARY_SIGNING_PRIVATE_KEY }}
          ED25519_BINARY_SIGNING_PUBLIC_KEY: ${{ vars.ED25519_BINARY_SIGNING_PUBLIC_KEY }}
        run: |
          ext=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            ext=".exe"
          fi

          for bin in \
            "fallow-${{ matrix.npm_dir }}${ext}" \
            "fallow-multicall-${{ matrix.npm_dir }}${ext}" \
            "fallow-lsp-${{ matrix.npm_dir }}${ext}" \
            "fallow-mcp-${{ matrix.npm_dir }}${ext}"
          do
            node .github/scripts/sign-binary.mjs "$bin" "${bin}.sig"
            node .github/scripts/verify-binary.mjs "$bin" "${bin}.sig"
          done

      # The npm platform packages ship ONE binary: the multicall `fallow`
      # (CLI + LSP + MCP linked into a single engine). Stage it plus its
      # signature under the package's `fallow(.exe)` name so the "Upload npm
      # binary" step carries exactly those two files into the npm-<platform>
      # artifact, which `npm-prep` copies into `@fallow-cli/<platform>/`. The
      # standalone per-binary GitHub release assets (`fallow-<npm_dir>`,
      # `fallow-lsp-<npm_dir>`, `fallow-mcp-<npm_dir>`) are uploaded separately
      # above and are unchanged. `npm/fallow/scripts/verify-binary.js` and the
      # GitHub Action installer verify the Ed25519 signature, then cross-check
      # SHA-256 against the release asset digest. Refs #465.
      - name: Stage npm platform payload (multicall binary as fallow)
        shell: bash
        run: |
          ext=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            ext=".exe"
          fi
          mkdir -p npm-payload
          cp "fallow-multicall-${{ matrix.npm_dir }}${ext}"     "npm-payload/fallow${ext}"
          cp "fallow-multicall-${{ matrix.npm_dir }}${ext}.sig" "npm-payload/fallow${ext}.sig"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fallow-cli-${{ matrix.npm_dir }}
          path: |
            fallow-${{ matrix.npm_dir }}${{ runner.os == 'Windows' && '.exe' || '' }}
            fallow-${{ matrix.npm_dir }}${{ runner.os == 'Windows' && '.exe' || '' }}.sig

      - name: Upload LSP artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fallow-lsp-${{ matrix.npm_dir }}
          path: |
            fallow-lsp-${{ matrix.npm_dir }}${{ runner.os == 'Windows' && '.exe' || '' }}
            fallow-lsp-${{ matrix.npm_dir }}${{ runner.os == 'Windows' && '.exe' || '' }}.sig

      - name: Upload MCP artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fallow-mcp-${{ matrix.npm_dir }}
          path: |
            fallow-mcp-${{ matrix.npm_dir }}${{ runner.os == 'Windows' && '.exe' || '' }}
            fallow-mcp-${{ matrix.npm_dir }}${{ runner.os == 'Windows' && '.exe' || '' }}.sig

      - name: Upload npm binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: npm-${{ matrix.npm_dir }}
          path: |
            npm-payload/fallow${{ runner.os == 'Windows' && '.exe' || '' }}
            npm-payload/fallow${{ runner.os == 'Windows' && '.exe' || '' }}.sig

      - name: Upload NAPI addon
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: napi-${{ matrix.npm_dir }}
          path: crates/napi/fallow-node.${{ matrix.npm_dir }}.node

  validate:
    name: Release validation
    uses: ./.github/workflows/release-validation.yml
    permissions:
      contents: read

  release:
    name: Create Release
    needs: release-verified
    runs-on: ubuntu-latest
    permissions:
      # Required to create GitHub Releases and to push the rolling v1 action
      # tag below. The push uses an explicit token URL, not git/config-persisted
      # credentials, so checkout runs with persist-credentials: false.
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          pattern: fallow-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: artifacts/**/*
          generate_release_notes: false
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # The rolling v1/v3 action tags are pushed by the maintainer's release
      # flow, not from here: GITHUB_TOKEN can never update a ref whose diff
      # touches .github/workflows/ (GitHub requires the workflows permission,
      # which GITHUB_TOKEN cannot be granted), so the in-workflow push failed
      # on the first release after any workflow edit (v3.4.2).

  # The Dockerfile pins ARG FALLOW_VERSION plus two per-arch sha256 digests by
  # hand. Nothing kept them in sync with releases: the pin sat on 2.94.0 for
  # 13 releases until #1805 fixed it manually. This job closes that gap by
  # rewriting the pins from the assets `release` just published and opening a
  # PR, every release, automatically. Refs #1817.
  #
  # The digests cannot be produced earlier (e.g. as part of the release
  # commit itself): they depend on the musl binaries the `build` matrix job
  # compiles and `release` uploads, both of which only exist after the tag
  # push that triggers this whole workflow. A follow-up job is the only sound
  # design.
  #
  # No other job `needs` this one, intentionally: a Dockerfile refactor that
  # trips one of update-dockerfile-pins.mjs's guards (see that file) must
  # never block npm/VS Code publishing.
  docker-lockstep:
    name: Docker lockstep
    needs: release
    runs-on: ubuntu-latest
    permissions:
      # contents: write pushes the docker-lockstep/vX.Y.Z branch (via an
      # explicit token URL below, not persisted checkout credentials).
      # pull-requests: write opens the PR against it.
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: false

      - name: Compute release version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Download published assets and rewrite Dockerfile pins
        env:
          # Hashes the exact bytes users' `docker build` fetches from the
          # release, catching upload corruption as well as a stale pin.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
            --pattern fallow-linux-x64-musl --pattern fallow-linux-arm64-musl \
            --dir /tmp/docker-lockstep-assets
          X64_SHA="$(sha256sum /tmp/docker-lockstep-assets/fallow-linux-x64-musl | cut -d ' ' -f1)"
          ARM64_SHA="$(sha256sum /tmp/docker-lockstep-assets/fallow-linux-arm64-musl | cut -d ' ' -f1)"
          node .github/scripts/update-dockerfile-pins.mjs "${VERSION}" "${X64_SHA}" "${ARM64_SHA}"

      - name: Sanity-build the amd64 image
        # arm64 digest correctness is already proven by hashing the published
        # asset above; this also re-runs the Dockerfile's own `sha256sum -c`,
        # so a corrupted pin fails the build here rather than shipping.
        run: |
          docker build -t fallow:docker-lockstep-check .
          docker run --rm fallow:docker-lockstep-check --version | grep -qF "${VERSION}"

      - name: Open pull request with the refreshed pins
        env:
          # A PR opened with the default GITHUB_TOKEN triggers no
          # `pull_request` workflows (a GitHub restriction), so it needs a
          # manual close/reopen, a label, or admin squash-merge to satisfy
          # fallow-rs's required checks. Configuring a fine-grained PAT or
          # GitHub App token in LOCKSTEP_PR_TOKEN makes the PR trigger CI
          # like any other; this is a maintainer config decision, not a code
          # change.
          GH_TOKEN: ${{ secrets.LOCKSTEP_PR_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="docker-lockstep/v${VERSION}"
          git checkout -b "${BRANCH}"
          git add Dockerfile
          git commit -m "chore(docker): pin FALLOW_VERSION ${VERSION} with refreshed checksums"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}" \
            "HEAD:refs/heads/${BRANCH}" --force

          BODY="Automated Dockerfile lockstep for the v${VERSION} release: refreshes ARG FALLOW_VERSION and both per-arch sha256 pins from the just-published release assets. Refs #1817."
          if ! gh pr create --repo "${GITHUB_REPOSITORY}" --base main --head "${BRANCH}" \
            --title "chore(docker): pin FALLOW_VERSION ${VERSION} with refreshed checksums" \
            --body "${BODY}"; then
            echo "a pull request for ${BRANCH} may already exist; verifying" >&2
            gh pr view "${BRANCH}" --repo "${GITHUB_REPOSITORY}"
          fi

  # Belt-and-suspenders generated contract drift check before either privileged
  # publish job runs. PR CI runs `npm run generate:contracts:check` on every relevant
  # contract change, but a release tag could in theory be cut on a commit where
  # a committed generated surface disagrees with what regen would produce
  # (force-push to main, history rewrite, tag pointed at an old SHA). The root
  # bundle validates config/plugin/rule-pack schemas, output schema, npm
  # capability metadata, issue registry export, TS output contracts, NAPI types,
  # and agent docs.
  # Failure here blocks `npm-publish` AND `vscode-publish`. Refs #416.
  #
  # Prep-tier job: `contents: read` only, no publish tokens, so running
  # `pnpm install` here matches the release-workflow security boundary
  # (untrusted-code-may-run is fine without tokens; tokens-present jobs
  # never install).
  release-verified:
    name: Release verified
    needs: [build, validate]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - run: echo "Release artifacts and cross-platform checks passed"

  # Build the npm publish tree (versioned package.json files, binaries, NAPI
  # addons, schema) into immutable tarballs. This job runs no publish
  # credentials. The split exists to keep `npm ci`, dependency install
  # scripts, and any other untrusted-code execution off the privileged
  # publish job. See the npm-publish job below for the matching pattern.
  npm-prep:
    name: Pack npm tarballs
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          # Intentionally no registry-url: this job must not write
          # NODE_AUTH_TOKEN to .npmrc. Auth lives in the publish job.

      - name: Download all npm binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: npm-*
          path: npm-artifacts

      - name: Download all NAPI addons
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: napi-*
          path: napi-artifacts

      - name: Organize binaries into npm directories
        run: |
          for dir in npm-artifacts/npm-*; do
            target="npm/$(basename "$dir" | sed 's/^npm-//')"
            mkdir -p "$target"
            cp "$dir"/* "$target"/
          done

      - name: Set binary permissions
        run: |
          # Platform packages now ship a single multicall `fallow` binary; the
          # bundled lsp/mcp launcher shims in the wrapper spawn it. Windows
          # `fallow.exe` needs no +x bit.
          for bin in npm/*/fallow; do
            [ -f "$bin" ] && chmod +x "$bin"
          done

      - name: Update versions
        env:
          # The ref is read via process.env in the embedded node script, not
          # interpolated into a heredoc, so a malformed ref cannot break out
          # of the script body.
          PKG_VERSION_REF: ${{ github.ref }}
        run: |
          VERSION="${PKG_VERSION_REF#refs/tags/v}"
          export PKG_VERSION="$VERSION"
          for pkg in npm/*/package.json; do
            PKG_PATH="$pkg" node -e '
              const fs = require("fs");
              const path = process.env.PKG_PATH;
              const version = process.env.PKG_VERSION;
              const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
              pkg.version = version;
              if (pkg.optionalDependencies) {
                for (const key of Object.keys(pkg.optionalDependencies)) {
                  if (key.startsWith("@fallow-cli/")) {
                    pkg.optionalDependencies[key] = version;
                  }
                }
              }
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + "\n");
            '
          done

      # Embed each platform binary's SHA-256 digest into its platform
      # package's package.json under the `fallowDigests` field. The npm
      # postinstall script (`npm/fallow/scripts/verify-binary.js`) reads
      # this field first and only falls back to the GitHub release API
      # when it is absent. Without the embedded digest, shared-IP CI
      # runners hit the 60 req/hr unauthenticated rate limit and the
      # install aborts with `digest-unavailable`. PKG_PATH is set by the
      # surrounding shell from a glob over npm/*/package.json, never from
      # untrusted input. Refs #597.
      - name: Embed SHA-256 digests into platform packages
        run: |
          for pkg in npm/*/package.json; do
            PKG_PATH="$pkg" node -e '
              const fs = require("fs");
              const path = require("path");
              const crypto = require("crypto");
              const manifestPath = process.env.PKG_PATH;
              const dir = path.dirname(manifestPath);
              const pkg = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
              // Only platform packages (@fallow-cli/<platform>) ship binaries;
              // the npm/fallow wrapper has no binaries to digest. Skip it
              // silently so the same glob keeps working across both shapes.
              if (typeof pkg.name !== "string" || !pkg.name.startsWith("@fallow-cli/")) {
                process.exit(0);
              }
              const digests = {};
              for (const entry of fs.readdirSync(dir)) {
                if (entry.endsWith(".sig") || entry === "package.json" || entry === "README.md") {
                  continue;
                }
                const full = path.join(dir, entry);
                const stat = fs.statSync(full);
                if (!stat.isFile()) continue;
                digests[entry] = "sha256:" + crypto.createHash("sha256").update(fs.readFileSync(full)).digest("hex");
              }
              if (Object.keys(digests).length === 0) {
                console.error("no binaries found in " + dir);
                process.exit(1);
              }
              pkg.fallowDigests = digests;
              fs.writeFileSync(manifestPath, JSON.stringify(pkg, null, 2) + "\n");
              console.log(manifestPath + ": " + Object.keys(digests).join(", "));
            '
          done

      - name: Install NAPI package dependencies
        # --ignore-scripts blocks dependency-tree install scripts here too, on
        # top of the prep/publish split. The split (keeping dependency installs
        # off the token-holding npm-publish job) is the primary guard; this is
        # belt-and-suspenders. napi build does not need install scripts to
        # produce the native addon, so disabling them is safe.
        run: cd crates/napi && npm ci --omit=optional --ignore-scripts

      - name: Update NAPI package version
        env:
          PKG_VERSION_REF: ${{ github.ref }}
        run: |
          VERSION="${PKG_VERSION_REF#refs/tags/v}"
          PKG_VERSION="$VERSION" node -e '
            const fs = require("fs");
            const path = "crates/napi/package.json";
            const version = process.env.PKG_VERSION;
            const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
            pkg.version = version;
            if (pkg.optionalDependencies) {
              for (const key of Object.keys(pkg.optionalDependencies)) {
                if (key.startsWith("@fallow-cli/fallow-node")) {
                  pkg.optionalDependencies[key] = version;
                }
              }
            }
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + "\n");
          '

      - name: Prepare NAPI root package for publish
        run: cd crates/napi && npm run publish:prepare

      - name: Create NAPI platform package directories
        run: cd crates/napi && npm run create-npm-dirs

      - name: Organize NAPI addons into platform directories
        run: |
          for dir in napi-artifacts/napi-*; do
            target="crates/napi/npm/$(basename "$dir" | sed 's/^napi-//')"
            mkdir -p "$target"
            cp "$dir"/* "$target"/
          done

      # Bundle the JSON schema into the fallow npm package so consumers
      # can reference it from `node_modules/fallow/schema.json`. Without
      # this, users either pin to a remote URL that drifts from the
      # installed CLI version, or have to run `fallow config-schema`
      # themselves and refresh on every upgrade. See
      # https://github.com/fallow-rs/fallow/issues/275.
      - name: Bundle schema.json into fallow package
        run: |
          cp schema.json npm/fallow/schema.json
          # Document the cp invariant: npm/fallow/schema.json is the root
          # schema.json verbatim. A future refactor that drops or moves the
          # cp will fail loud here instead of silently shipping a stale
          # schema to npm consumers. Refs #440.
          diff schema.json npm/fallow/schema.json

      - name: Pack tarballs
        run: |
          # Publish order matters: platform packages before their meta package,
          # NAPI platform packages before the @fallow-cli/fallow-node root.
          # Numbered subdirectories make the order explicit and survive the
          # download/upload artifact round-trip; the publish job iterates them
          # in sequence and publishes whatever .tgz it finds inside.
          rm -rf tarballs
          mkdir -p tarballs/10-cli-platform tarballs/20-cli-root tarballs/30-napi-platform tarballs/40-napi-root

          # Emit a manifest alongside the tarballs so the publish job can look
          # up name/version without executing any code from inside a tarball.
          : > tarballs/manifest.tsv

          pack() {
            local dest="$1"
            local src="$2"
            local name version filename pkg_path="$GITHUB_WORKSPACE/$src/package.json"
            name=$(PKG_PATH="$pkg_path" node -p 'require(process.env.PKG_PATH).name')
            version=$(PKG_PATH="$pkg_path" node -p 'require(process.env.PKG_PATH).version')
            filename=$(cd "$dest" && npm pack --ignore-scripts "$GITHUB_WORKSPACE/$src" | tail -n1)
            if [ -z "$filename" ] || [ ! -f "$dest/$filename" ]; then
              echo "::error::npm pack produced no tarball for $src (filename='$filename')"
              return 1
            fi
            # Use tabs as separators; tarball paths and package names never
            # contain tabs.
            printf '%s\t%s\t%s\n' "$dest/$filename" "$name" "$version" >> tarballs/manifest.tsv
          }

          for dir in \
            ./npm/darwin-arm64 \
            ./npm/darwin-x64 \
            ./npm/linux-x64-gnu \
            ./npm/linux-arm64-gnu \
            ./npm/linux-x64-musl \
            ./npm/linux-arm64-musl \
            ./npm/win32-x64-msvc \
            ./npm/win32-arm64-msvc
          do
            pack tarballs/10-cli-platform "$dir"
          done

          pack tarballs/20-cli-root ./npm/fallow

          for dir in \
            ./crates/napi/npm/darwin-arm64 \
            ./crates/napi/npm/darwin-x64 \
            ./crates/napi/npm/linux-x64-gnu \
            ./crates/napi/npm/linux-arm64-gnu \
            ./crates/napi/npm/linux-x64-musl \
            ./crates/napi/npm/linux-arm64-musl \
            ./crates/napi/npm/win32-x64-msvc \
            ./crates/napi/npm/win32-arm64-msvc
          do
            pack tarballs/30-napi-platform "$dir"
          done

          pack tarballs/40-napi-root ./crates/napi

          echo "--- manifest ---"
          cat tarballs/manifest.tsv

      # Fail the release if any packed tarball omits a file it declares in its
      # own `files` whitelist. npm silently drops a `files` entry with no
      # matching file on disk, so a broken `.sig` staging step would otherwise
      # publish a platform package missing `fallow.sig` (the Action installer
      # then hard-fails every install with `sig-missing`). Runs in the
      # token-free prep job, before upload, so the publish job never sees a
      # broken tarball. Refs #944.
      - name: Verify packed tarballs contain every declared file
        run: |
          node .github/scripts/verify-pack-contents.mjs \
            tarballs/10-cli-platform/*.tgz \
            tarballs/20-cli-root/*.tgz

      - name: Upload npm tarballs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: npm-tarballs
          path: tarballs/
          retention-days: 7
          include-hidden-files: false

  npm-publish:
    name: Publish to npm
    # Privileged job. Keep the surface tiny:
    # - downloads pre-packed tarballs (no fresh checkout, no installs)
    # - the only network calls are `npm publish` and the `npm view` precheck
    # - --ignore-scripts on every publish blocks lifecycle scripts inside the
    #   tarballs from executing here.
    # Anything that needs `npm ci` or runs dependency code belongs in npm-prep.
    needs: [npm-prep, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      # Bootstrap fallback. When NPM_TOKEN is present in repo secrets,
      # setup-node writes it to .npmrc and `npm publish` authenticates
      # with it. When the secret is absent (steady state, once every
      # package has a trusted publisher registered), this stays empty
      # and OIDC / trusted publishing handles auth exactly like today.
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Pin the global npm to a known-good version. `npm@latest` would pull
      # whatever tag is current at publish time; we keep this explicit so a
      # compromised `latest` tag cannot land in the privileged job without a
      # commit to this file.
      #
      # Two-step bootstrap is required on Node 22 runners. The runner's bundled
      # npm has a broken dependency tree (`Cannot find module 'promise-retry'`)
      # when asked to install npm@11.x directly. Installing npm@10.9.8 first
      # repairs the tree so the second step (the actual pinned version that
      # holds OIDC trusted-publishing config) can land. Both invocations carry
      # --ignore-scripts so the supply-chain hardening surface stays narrow.
      # See incident v2.71.0 -> v2.71.1.
      - name: Install pinned npm (required for trusted publishing)
        run: |
          npm install -g --ignore-scripts npm@10.9.8
          npm install -g --ignore-scripts npm@11.14.1

      - name: Download npm tarballs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: npm-tarballs
          path: tarballs

      - name: Publish all tarballs
        shell: bash
        env:
          PKG_VERSION_REF: ${{ github.ref }}
        run: |
          if [ ! -s tarballs/manifest.tsv ]; then
            echo "::error::tarballs/manifest.tsv missing or empty; npm-prep did not produce any tarballs"
            exit 1
          fi
          VERSION="${PKG_VERSION_REF#refs/tags/v}"
          # Fixed expected count: 8 cli platform + 1 cli root + 8 napi platform
          # + 1 napi root = 18 entries. If this number changes, update the
          # numbered-stage matrix in npm-prep AND this constant together.
          EXPECTED=18
          ACTUAL=$(wc -l < tarballs/manifest.tsv | tr -d ' ')
          if [ "$ACTUAL" -ne "$EXPECTED" ]; then
            echo "::error::Expected $EXPECTED tarballs in manifest, got $ACTUAL"
            cat tarballs/manifest.tsv
            exit 1
          fi
          expected_names=(
            "@fallow-cli/darwin-arm64"
            "@fallow-cli/darwin-x64"
            "@fallow-cli/linux-x64-gnu"
            "@fallow-cli/linux-arm64-gnu"
            "@fallow-cli/linux-x64-musl"
            "@fallow-cli/linux-arm64-musl"
            "@fallow-cli/win32-x64-msvc"
            "@fallow-cli/win32-arm64-msvc"
            "fallow"
            "@fallow-cli/fallow-node-darwin-arm64"
            "@fallow-cli/fallow-node-darwin-x64"
            "@fallow-cli/fallow-node-linux-x64-gnu"
            "@fallow-cli/fallow-node-linux-arm64-gnu"
            "@fallow-cli/fallow-node-linux-x64-musl"
            "@fallow-cli/fallow-node-linux-arm64-musl"
            "@fallow-cli/fallow-node-win32-x64-msvc"
            "@fallow-cli/fallow-node-win32-arm64-msvc"
            "@fallow-cli/fallow-node"
          )
          FAILED=0
          index=0
          # Manifest format (TSV): <tarball-path>\t<name>\t<version>. Rows are
          # emitted in publish order by npm-prep, so we just walk top to bottom.
          while IFS=$'\t' read -r file name version; do
            [ -n "$file" ] || continue
            expected_name="${expected_names[$index]}"
            if [ "$name" != "$expected_name" ]; then
              echo "::error::Manifest row $((index + 1)) expected $expected_name, got $name"
              FAILED=1
              index=$((index + 1))
              continue
            fi
            if [ "$version" != "$VERSION" ]; then
              echo "::error::Manifest row $((index + 1)) for $name has version $version, expected tag version $VERSION"
              FAILED=1
              index=$((index + 1))
              continue
            fi
            if [ ! -f "$file" ]; then
              echo "::error::Tarball missing: $file"
              FAILED=1
              index=$((index + 1))
              continue
            fi
            actual_name=$(tar -xOf "$file" package/package.json | node -e 'const fs=require("fs"); console.log(JSON.parse(fs.readFileSync(0, "utf8")).name)')
            actual_version=$(tar -xOf "$file" package/package.json | node -e 'const fs=require("fs"); console.log(JSON.parse(fs.readFileSync(0, "utf8")).version)')
            if [ "$actual_name" != "$name" ] || [ "$actual_version" != "$version" ]; then
              echo "::error::Tarball package.json mismatch for $file: manifest=$name@$version tarball=$actual_name@$actual_version"
              FAILED=1
              index=$((index + 1))
              continue
            fi
            echo "Publishing $name@$version from $file"
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "  Already published, skipping"
              index=$((index + 1))
              continue
            fi
            if ! npm publish "$file" --access public --provenance --ignore-scripts; then
              echo "::error::Failed to publish $name@$version with npm provenance"
              FAILED=1
            fi
            index=$((index + 1))
          done < tarballs/manifest.tsv
          if [ "$index" -ne "$EXPECTED" ]; then
            echo "::error::Validated $index tarballs, expected $EXPECTED"
            exit 1
          fi
          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

  # Build the .vsix in a job with no marketplace tokens. The matching
  # vscode-publish job below downloads the .vsix as an artifact and runs
  # only `vsce publish --packagePath` / `ovsx publish <file>` so VSCE_PAT
  # and OVSX_PAT are never co-resident with `pnpm install` / extension
  # build steps that execute dependency code.
  vscode-prep:
    name: Build VS Code .vsix
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: editors/vscode/pnpm-lock.yaml

      - name: Install dependencies
        run: cd editors/vscode && pnpm install --frozen-lockfile --ignore-scripts

      - name: Update extension version
        env:
          PKG_VERSION_REF: ${{ github.ref }}
        run: |
          VERSION="${PKG_VERSION_REF#refs/tags/v}"
          PKG_VERSION="$VERSION" node -e '
            const fs = require("fs");
            const path = "editors/vscode/package.json";
            const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
            pkg.version = process.env.PKG_VERSION;
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + "\n");
          '

      - name: Copy LICENSE into extension directory
        run: cp LICENSE editors/vscode/LICENSE

      - name: Build and package extension
        run: |
          cd editors/vscode
          pnpm build
          pnpm package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fallow-vscode
          path: editors/vscode/*.vsix

  vscode-publish:
    name: Publish VS Code Extension
    needs: [vscode-prep, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Download VSIX
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: fallow-vscode
          path: vsix

      - name: Locate VSIX
        id: vsix
        run: |
          file_count=$(find vsix -maxdepth 1 -name '*.vsix' -type f | wc -l | tr -d ' ')
          if [ "$file_count" -ne 1 ]; then
            echo "::error::Expected exactly one .vsix file in artifact, found $file_count"
            find vsix -maxdepth 1 -name '*.vsix' -type f | sort
            exit 1
          fi
          file=$(find vsix -maxdepth 1 -name '*.vsix' -type f | sort | head -n1)
          echo "path=$file" >> "$GITHUB_OUTPUT"

      # Install the publisher CLIs with --ignore-scripts so any compromised
      # install/postinstall script of @vscode/vsce or ovsx (or a transitive
      # dependency) cannot execute with VSCE_PAT / OVSX_PAT in the
      # environment. Versions are pinned to match the editor's pnpm-lock.
      - name: Install publisher CLIs
        run: npm install -g --ignore-scripts @vscode/vsce@3.9.1 ovsx@0.10.11

      - name: Publish to VS Code Marketplace
        # continue-on-error so a transient failure here does not skip Open VSX
        # publish below. On a `gh run rerun --failed`, vsce will exit non-zero
        # with version-exists, but the next step still runs.
        continue-on-error: true
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          VSIX_PATH: ${{ steps.vsix.outputs.path }}
        run: vsce publish --packagePath "$VSIX_PATH" --no-dependencies

      - name: Publish to Open VSX (Cursor, VSCodium)
        # continue-on-error so a transient 502 from openvsx.org does not block
        # an isolated re-run from succeeding. Without this, `gh run rerun
        # --failed` re-runs the entire job, vsce publish then fails with
        # version-exists, and Open VSX never gets retried.
        continue-on-error: true
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
          VSIX_PATH: ${{ steps.vsix.outputs.path }}
        run: ovsx publish "$VSIX_PATH" --no-dependencies
