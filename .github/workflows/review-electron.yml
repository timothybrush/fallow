name: Review Electron

on:
  push:
    branches: [main]
    paths:
      - 'apps/review-electron/**'
      - '.github/workflows/review-electron.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/review-electron/**'
      - '.github/workflows/review-electron.yml'
  workflow_dispatch:

concurrency:
  group: review-electron-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test:
    name: Typecheck, lint, and test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/review-electron
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/review-electron/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test
