[advisories]
# Build scripts (build.rs) and proc-macros execute arbitrary code at BUILD time,
# on CI and on the release runner that signs fallow's binaries. `npm
# --ignore-scripts` does nothing for this Cargo-side vector, so cargo-deny is the
# gate: RUSTSEC advisories deny by default in cargo-deny v2, and a yanked crate
# (often the first signal of a compromised or withdrawn release) is treated the
# same way. Every entry added to `ignore` must carry a one-line justification so
# the suppression is auditable, not a silent hole.
ignore = []
yanked = "deny"

[licenses]
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "MPL-2.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
